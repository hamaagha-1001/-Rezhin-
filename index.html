<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezhin 🤍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #0b0314, #1a0f3d, #27114c);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* دروستکردنی بارانی دڵ و ناو بە جووڵەی بەردەوام و نەرم */
        .rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            top: -100px;
            color: #ffffff;
            font-weight: bold;
            font-size: 22px;
            white-space: nowrap;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
            animation: fall linear infinite;
        }

        /* دابەشکردنی بارانەکە بەسەر شاشەکەدا بە کات و شوێنی جیاواز */
        .d1 { left: 8%; animation-duration: 5s; animation-delay: 0s; }
        .d2 { left: 23%; animation-duration: 6.5s; animation-delay: 2s; font-size: 18px; opacity: 0.7; }
        .d3 { left: 38%; animation-duration: 4.5s; animation-delay: 0.8s; }
        .d4 { left: 52%; animation-duration: 7s; animation-delay: 3.2s; font-size: 20px; opacity: 0.8; }
        .d5 { left: 68%; animation-duration: 5.5s; animation-delay: 1.5s; }
        .d6 { left: 82%; animation-duration: 6s; animation-delay: 0.4s; font-size: 17px; opacity: 0.7; }
        .d7 { left: 93%; animation-duration: 4.8s; animation-delay: 2.5s; }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                transform: translateY(110vh) rotate(15deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="rain">
        <div class="drop d1">Rezhin 🤍</div>
        <div class="drop d2">🤍</div>
        <div class="drop d3">Rezhin 🤍</div>
        <div class="drop d4">🤍</div>
        <div class="drop d5">Rezhin 🤍</div>
        <div class="drop d6">🤍</div>
        <div class="drop d7">Rezhin 🤍</div>
    </div>

</body>
</html>
