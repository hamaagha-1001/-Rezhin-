<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezhin 🤍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #0b0314, #1c1444);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            top: -50px;
            color: #ffffff;
            font-weight: bold;
            white-space: nowrap;
            animation: fall linear infinite;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }

        @keyframes fall {
            0% {
                transform: translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="rain-container" id="rainContainer"></div>

    <script>
        const container = document.getElementById('rainContainer');
        const rainItems = ['Rezhin 🤍', '🤍', 'Rezhin 🤍', '🤍'];

        function createRainDrop() {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.innerText = rainItems[Math.floor(Math.random() * rainItems.length)];
            
            drop.style.left = Math.random() * 90 + '%';
            
            const size = Math.random() * 10 + 16; 
            drop.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 3;
            drop.style.animationDuration = duration + 's';

            container.appendChild(drop);

            setTimeout(() => {
                drop.remove();
            }, duration * 1000);
        }

        // دروستکردنی بارانی دەستبەجێ
        for (let i = 0; i < 20; i++) {
            createRainDrop();
        }
        
        setInterval(createRainDrop, 300);
    </script>

</body>
</html>
